<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hábitos">
<title>Construtor de Hábito</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c11;
  --s1: #14141c;
  --s2: #1c1c27;
  --s3: #242433;
  --y: #f5c842;
  --p: #b97dfc;
  --g: #3dd68c;
  --r: #f87171;
  --b: #60a5fa;
  --o: #fb923c;
  --pi: #f472b6;
  --t: #eeeeff;
  --m: #6868a0;
  --rad: 18px;
  --safe: env(safe-area-inset-bottom, 16px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg); color:var(--t);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  padding-bottom:calc(72px + var(--safe));
  background-image:
    radial-gradient(ellipse 55% 35% at 5% 0%,rgba(245,200,66,.07) 0%,transparent 60%),
    radial-gradient(ellipse 45% 45% at 95% 0%,rgba(185,125,252,.07) 0%,transparent 60%);
}

/* TABS */
.tabs{
position:fixed;bottom:0;left:0;right:0;
background:rgba(20,20,28,.97);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.06);
display:flex; padding-bottom:var(–safe); z-index:100;
}
.tab{
flex:1;display:flex;flex-direction:column;align-items:center;
padding:10px 0 5px; cursor:pointer; border:none; background:none;
color:var(–m); font-family:‘DM Sans’,sans-serif;
font-size:.62rem; font-weight:500; gap:3px; transition:color .2s;
}
.tab.active{color:var(–y);}
.tab-icon{font-size:1.25rem;}

/* PAGES */
.page{display:none;padding:20px 16px 12px;animation:fadeIn .3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* PAGE HEADER */
.page-title{
font-family:‘Syne’,sans-serif;font-size:1.5rem;font-weight:800;
background:linear-gradient(90deg,var(–y),var(–p));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
line-height:1.1;
}
.page-sub{color:var(–m);font-size:.8rem;margin-top:4px;}
.page-header{margin-bottom:18px;}

/* WEEK BANNER */
.week-banner{
background:var(–s1);border:1px solid rgba(255,255,255,.06);
border-radius:var(–rad);padding:13px 16px;
display:flex;align-items:center;justify-content:space-between;
margin-bottom:16px;
}
.week-label{font-family:‘Syne’,sans-serif;font-weight:700;font-size:.85rem;}
.week-sub{font-size:.72rem;color:var(–m);margin-top:2px;}
.week-ring{position:relative;width:48px;height:48px;}
.week-ring svg{transform:rotate(-90deg);}
.wr-bg{fill:none;stroke:var(–s3);stroke-width:5;}
.wr-fill{fill:none;stroke-width:5;stroke-linecap:round;stroke:url(#wg);
stroke-dasharray:132;stroke-dashoffset:132;
transition:stroke-dashoffset .5s cubic-bezier(.34,1.56,.64,1);}
.wr-text{
position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;
font-family:‘Syne’,sans-serif;font-size:.7rem;font-weight:800;
background:linear-gradient(135deg,var(–y),var(–p));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* CATEGORY */
.cat{margin-bottom:18px;}
.cat-hd{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding:0 2px;}
.cat-ico{
width:32px;height:32px;border-radius:9px;background:var(–s2);
display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
}
.cat-name{font-family:‘Syne’,sans-serif;font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;}
.cat-prog{margin-left:auto;font-size:.7rem;color:var(–m);background:var(–s2);padding:2px 9px;border-radius:99px;}

/* TASK */
.tasks{display:flex;flex-direction:column;gap:7px;}
.task{
background:var(–s1);border:1px solid rgba(255,255,255,.055);
border-radius:13px;padding:12px 14px;
display:flex;align-items:center;gap:11px;
cursor:pointer;transition:transform .15s,opacity .25s;
position:relative;overflow:hidden;
}
.task::before{
content:’’;position:absolute;left:0;top:0;bottom:0;
width:3px;border-radius:99px;opacity:0;transition:opacity .25s;
}
.task:active{transform:scale(.97);}

/* WEEKLY TASK STATES */
.task.goal-done{
background:linear-gradient(135deg,rgba(61,214,140,.08),rgba(245,200,66,.06));
border-color:rgba(61,214,140,.25);
opacity:.8;
}
.task.goal-done::before{opacity:1;}
.task.daily-done{opacity:.5;}
.task.daily-done::before{opacity:1;}

.task-left{flex:1;min-width:0;}
.task-name{font-size:.88rem;font-weight:500;transition:color .2s;}
.task.daily-done .task-name{text-decoration:line-through;color:var(–m);}
.task.goal-done .task-name{color:var(–g);}
.task-sub{font-size:.7rem;color:var(–m);margin-top:2px;}

/* DOTS ROW */
.dots{display:flex;gap:5px;margin-top:7px;align-items:center;flex-wrap:wrap;}
.dot{
width:20px;height:20px;border-radius:6px;
border:2px solid rgba(255,255,255,.12);
display:flex;align-items:center;justify-content:center;
font-size:.65rem;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.dot.checked{border-color:transparent;}
.goal-badge{
margin-left:4px;
font-family:‘Syne’,sans-serif;font-size:.65rem;font-weight:800;
background:rgba(61,214,140,.15);color:var(–g);
padding:2px 8px;border-radius:99px;white-space:nowrap;
}

/* cat accent colors */
.cc-g .cat-name{color:var(–g);}
.cc-g .task::before,.cc-g .task.goal-done::before,.cc-g .task.daily-done::before{background:var(–g);}
.cc-p .cat-name{color:var(–p);}
.cc-p .task::before,.cc-p .task.goal-done::before,.cc-p .task.daily-done::before{background:var(–p);}
.cc-b .cat-name{color:var(–b);}
.cc-b .task::before,.cc-b .task.goal-done::before,.cc-b .task.daily-done::before{background:var(–b);}
.cc-y .cat-name{color:var(–y);}
.cc-y .task::before,.cc-y .task.goal-done::before,.cc-y .task.daily-done::before{background:var(–y);}
.cc-r .cat-name{color:var(–r);}
.cc-r .task::before,.cc-r .task.goal-done::before,.cc-r .task.daily-done::before{background:var(–r);}
.cc-o .cat-name{color:var(–o);}
.cc-o .task::before,.cc-o .task.goal-done::before,.cc-o .task.daily-done::before{background:var(–o);}
.cc-pi .cat-name{color:var(–pi);}
.cc-pi .task::before,.cc-pi .task.goal-done::before,.cc-pi .task.daily-done::before{background:var(–pi);}

/* DOT COLORS PER CAT */
.cc-g .dot.checked{background:var(–g);}
.cc-p .dot.checked{background:var(–p);}
.cc-b .dot.checked{background:var(–b);}
.cc-y .dot.checked{background:var(–y);}
.cc-r .dot.checked{background:var(–r);}
.cc-o .dot.checked{background:var(–o);}
.cc-pi .dot.checked{background:var(–pi);}

/* BURST */
.burst{position:fixed;pointer-events:none;z-index:9999;font-size:1.3rem;animation:bst .75s ease forwards;}
@keyframes bst{0%{transform:scale(.5) translateY(0);opacity:1}100%{transform:scale(1.5) translateY(-65px);opacity:0}}

/* STATS */
.month-nav{
display:flex;align-items:center;justify-content:space-between;
background:var(–s1);border:1px solid rgba(255,255,255,.06);
border-radius:var(–rad);padding:11px 14px;margin-bottom:14px;
}
.month-btn{
background:var(–s2);border:none;color:var(–t);
width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:1rem;
display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.month-btn:active{background:var(–s3);}
.month-label{font-family:‘Syne’,sans-serif;font-weight:700;font-size:.88rem;}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
.kpi{background:var(–s1);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:13px;}
.kpi-full{grid-column:1/-1;}
.kpi-icon{font-size:1.2rem;margin-bottom:5px;}
.kpi-val{font-family:‘Syne’,sans-serif;font-size:1.45rem;font-weight:800;line-height:1;}
.kpi-name{font-size:.7rem;color:var(–m);margin-top:3px;}

.card{background:var(–s1);border:1px solid rgba(255,255,255,.06);border-radius:var(–rad);padding:15px;margin-bottom:13px;}
.sec-label{font-family:‘Syne’,sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(–m);margin:16px 0 9px 2px;}

/* CALENDAR */
.cal-days-hd{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.6rem;color:var(–m);margin-bottom:5px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:500;}
.cal-day.empty{}
.cal-day.future{color:var(–s3);}
.cal-day.p0{background:var(–s2);color:var(–m);}
.cal-day.plow{background:rgba(248,113,113,.22);color:var(–r);}
.cal-day.pmid{background:rgba(251,146,60,.22);color:var(–o);}
.cal-day.pgood{background:rgba(61,214,140,.18);color:var(–g);}
.cal-day.pfull{background:linear-gradient(135deg,var(–y),var(–p));color:#111;font-weight:800;}
.cal-day.today-mark{outline:2px solid var(–y);outline-offset:1px;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(–m);}
.leg-dot{width:9px;height:9px;border-radius:3px;}

.habit-bars{display:flex;flex-direction:column;gap:10px;}
.hb-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.76rem;}
.hb-bg{background:var(–s3);border-radius:99px;height:6px;overflow:hidden;}
.hb-fill{height:100%;border-radius:99px;transition:width .5s ease;}

.forgot-item{display:flex;align-items:center;gap:10px;background:var(–s1);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:11px 13px;margin-bottom:8px;}
.forgot-badge{font-family:‘Syne’,sans-serif;font-size:.75rem;font-weight:800;background:rgba(248,113,113,.13);color:var(–r);padding:3px 9px;border-radius:99px;white-space:nowrap;}

.reset-btn{width:100%;margin-top:14px;padding:13px;background:var(–s1);border:1px solid rgba(255,255,255,.07);border-radius:var(–rad);color:var(–m);font-family:‘DM Sans’,sans-serif;font-size:.82rem;cursor:pointer;transition:background .2s;}
.reset-btn:active{background:var(–s2);}
</style>

</head>
<body>

<!-- ══ PAGE: HÁBITOS ══ -->

<div class="page active" id="pg-hab">
  <div class="page-header">
    <div class="page-title">🌱 Construtor de Hábito</div>
    <div class="page-sub" id="weekLabel"></div>
  </div>

  <!-- Week ring -->

  <div class="week-banner">
    <div>
      <div class="week-label">Progresso da semana</div>
      <div class="week-sub" id="weekProgressText">— metas atingidas</div>
    </div>
    <div class="week-ring">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <defs>
          <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f5c842"/>
            <stop offset="100%" stop-color="#b97dfc"/>
          </linearGradient>
        </defs>
        <circle class="wr-bg" cx="24" cy="24" r="21"/>
        <circle class="wr-fill" id="weekRing" cx="24" cy="24" r="21"/>
      </svg>
      <div class="wr-text" id="weekRingPct">0%</div>
    </div>
  </div>

  <div id="catList"></div>
  <button class="reset-btn" onclick="confirmReset()">↺ Nova semana (reset manual)</button>
</div>

<!-- ══ PAGE: STATS ══ -->

<div class="page" id="pg-stats">
  <div class="page-header">
    <div class="page-title">📊 Progresso</div>
    <div class="page-sub">Sua evolução mensal</div>
  </div>

  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-icon">🏆</div>
      <div class="kpi-val" id="kpiWeeks" style="color:var(--g)">—</div>
      <div class="kpi-name">Semanas com dado</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">⭐</div>
      <div class="kpi-val" id="kpiPerfect" style="color:var(--y)">—</div>
      <div class="kpi-name">Semanas perfeitas</div>
    </div>
    <div class="kpi kpi-full">
      <div class="kpi-icon">📈</div>
      <div class="kpi-val" id="kpiAvg" style="color:var(--p)">—</div>
      <div class="kpi-name">Taxa média de conclusão</div>
    </div>
  </div>

  <!-- Weekly heatmap -->

  <div class="card">
    <div class="sec-label" style="margin-top:0">Calendário do mês</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--s2)"></div>Sem dado</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(248,113,113,.4)"></div>&lt;50%</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(251,146,60,.4)"></div>50–79%</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(61,214,140,.3)"></div>80–99%</div>
      <div class="leg"><div class="leg-dot" style="background:var(--y)"></div>100% 🌟</div>
    </div>
    <div class="cal-days-hd"><span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="sec-label">📅 Metas atingidas por hábito</div>
  <div class="card"><div class="habit-bars" id="habitBars"></div></div>

  <div class="sec-label">💡 Hábitos que você esquece mais</div>
  <div id="forgotList"></div>
</div>

<!-- TABS -->

<nav class="tabs">
  <button class="tab active" onclick="showPage('hab',this)">
    <span class="tab-icon">🌱</span>Hábitos
  </button>
  <button class="tab" onclick="showPage('stats',this)">
    <span class="tab-icon">📊</span>Progresso
  </button>
</nav>

<script>
/* ══════════════════════════════════
   CATEGORIES & TASKS
══════════════════════════════════ */
const CATS = [
  {
    id:'saude', cls:'cc-g', ico:'💚', name:'Saúde e bem-estar',
    tasks:[
      {id:'agua',       n:'Beber 2L de água',         type:'weekly', goal:7, daily:true},
      {id:'exercicio',  n:'Exercício físico',          type:'weekly', goal:3},
      {id:'descanso',   n:'Descanso real',             type:'weekly', goal:2},
      {id:'skincare',   n:'Skin care',                 type:'weekly', goal:7, daily:true},
      {id:'comida',     n:'Comer comida saudável',     type:'weekly', goal:5},
      {id:'fruta',      n:'Fruta',                     type:'weekly', goal:7, daily:true},
    ]
  },
  {
    id:'maternidade', cls:'cc-pi', ico:'👶', name:'Maternidade',
    tasks:[
      {id:'devocional', n:'Devocional com Daniel',     type:'weekly', goal:2},
      {id:'lercantar',  n:'Ler/cantar para Daniel',    type:'weekly', goal:3},
      {id:'vitbebe',    n:'Vitaminas do bebê',         type:'weekly', goal:7, daily:true},
      {id:'vitmamai',   n:'Vitaminas mamãe',           type:'weekly', goal:7, daily:true},
    ]
  },
  {
    id:'mental', cls:'cc-p', ico:'🧠', name:'Saúde mental',
    tasks:[
      {id:'terapia',    n:'Terapia',                   type:'weekly', goal:1},
      {id:'sentimento', n:'Registrar sentimento',      type:'weekly', goal:7, daily:true},
      {id:'marido',     n:'Conexão com marido',        type:'weekly', goal:2},
      {id:'oracao',     n:'Oração / reflexão',         type:'weekly', goal:7, daily:true},
    ]
  },
  {
    id:'trabalho', cls:'cc-b', ico:'💼', name:'Trabalho e propósito',
    tasks:[
      {id:'entregas',   n:'Entregas principais',       type:'weekly', goal:3},
      {id:'planejar',   n:'Planejar semana',           type:'weekly', goal:1},
      {id:'estgov',     n:'Estudo Governança/SI',      type:'weekly', goal:2},
    ]
  },
  {
    id:'aprendizado', cls:'cc-y', ico:'📚', name:'Aprendizado',
    tasks:[
      {id:'biblico',    n:'Estudo bíblico',            type:'weekly', goal:2},
      {id:'podcast',    n:'Podcast / vídeo útil',      type:'weekly', goal:2},
      {id:'estnovo',    n:'Estudo novo',               type:'weekly', goal:1},
      {id:'ingles',     n:'Inglês',                    type:'weekly', goal:2},
      {id:'leitura',    n:'Leitura diária',            type:'weekly', goal:7, daily:true},
    ]
  },
  {
    id:'casa', cls:'cc-o', ico:'🏠', name:'Casa',
    tasks:[
      {id:'lavarroupas',n:'Lavar roupas',              type:'weekly', goal:4},
      {id:'dobrar',     n:'Dobrar / guardar roupas',   type:'weekly', goal:4},
    ]
  },
];

const TOTAL_GOALS = CATS.reduce((s,c)=>s+c.tasks.length,0);
const CAT_COLORS = ['#3dd68c','#f472b6','#b97dfc','#60a5fa','#f5c842','#fb923c'];
const BURSTS = ['⭐','✨','💫','🌟','🔥','🎉','💪'];
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
// state.checks[taskId] = number of checks this week
let state = {};
let viewMonth = { y: new Date().getFullYear(), m: new Date().getMonth() };

function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}_w${week}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem('chb_state');
    if (raw) {
      const p = JSON.parse(raw);
      if (p.weekKey === getWeekKey()) { state = p; return; }
      // New week — save snapshot then reset
      saveSnapshot(p);
    }
  } catch(e){}
  state = { weekKey: getWeekKey(), checks: {} };
}

function saveState() {
  localStorage.setItem('chb_state', JSON.stringify(state));
  // also save daily snapshot for calendar
  saveDailySnap();
}

function saveDailySnap() {
  const hist = getHistory();
  const today = new Date().toISOString().slice(0,10);
  const goalsHit = countGoalsHit(state.checks);
  const pct = Math.round(goalsHit / TOTAL_GOALS * 100);
  const catData = {};
  CATS.forEach(cat => {
    catData[cat.id] = cat.tasks.filter(t => (state.checks[t.id]||0) >= t.goal).length;
  });
  hist[today] = { pct, goalsHit, catData };
  localStorage.setItem('chb_history', JSON.stringify(hist));
}

function saveSnapshot(oldState) {
  // called when week rolls over
  saveDailySnap();
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('chb_history')) || {}; } catch(e){ return {}; }
}

function countGoalsHit(checks) {
  let n = 0;
  CATS.forEach(cat => cat.tasks.forEach(t => { if((checks[t.id]||0)>=t.goal) n++; }));
  return n;
}

/* ══════════════════════════════════
   AUTO RESET CHECK (Sunday midnight)
══════════════════════════════════ */
function checkAutoReset() {
  const now = new Date();
  const lastReset = localStorage.getItem('chb_lastReset');
  const thisWeek = getWeekKey();
  if (lastReset !== thisWeek) {
    // week changed
    if (state.weekKey && state.weekKey !== thisWeek) {
      saveSnapshot(state);
      state = { weekKey: thisWeek, checks: {} };
      localStorage.setItem('chb_lastReset', thisWeek);
      saveState();
    }
  }
}

/* ══════════════════════════════════
   BUILD UI
══════════════════════════════════ */
function buildCats() {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  CATS.forEach(cat => {
    const div = document.createElement('div');
    div.className = `cat ${cat.cls}`;
    div.id = `cat_${cat.id}`;
    const goalsHit = cat.tasks.filter(t=>(state.checks[t.id]||0)>=t.goal).length;
    div.innerHTML = `
      <div class="cat-hd">
        <div class="cat-ico">${cat.ico}</div>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-prog" id="cp_${cat.id}">${goalsHit}/${cat.tasks.length}</div>
      </div>
      <div class="tasks" id="tasks_${cat.id}"></div>`;
    list.appendChild(div);
    renderTasks(cat);
  });
}

function renderTasks(cat) {
  const container = document.getElementById(`tasks_${cat.id}`);
  if (!container) return;
  container.innerHTML = '';
  cat.tasks.forEach(t => {
    const checks = state.checks[t.id] || 0;
    const goalDone = checks >= t.goal;
    const el = document.createElement('div');
    el.id = `task_${t.id}`;
    el.className = `task${goalDone?' goal-done':''}`;

    // dots
    let dotsHtml = '<div class="dots">';
    for (let i = 0; i < t.goal; i++) {
      const checked = i < checks;
      dotsHtml += `<div class="dot${checked?' checked':''}" onclick="toggleDot('${cat.id}','${t.id}',${i},event)">${checked?'✓':''}</div>`;
    }
    if (goalDone) {
      dotsHtml += `<span class="goal-badge">✅ Meta atingida!</span>`;
    }
    dotsHtml += '</div>';

    el.innerHTML = `
      <div class="task-left">
        <div class="task-name">${t.n}</div>
        <div class="task-sub">${t.goal}x por semana</div>
        ${dotsHtml}
      </div>`;
    container.appendChild(el);
  });
}

function toggleDot(catId, taskId, dotIdx, e) {
  e.stopPropagation();
  const task = CATS.find(c=>c.id===catId).tasks.find(t=>t.id===taskId);
  const cur = state.checks[taskId] || 0;
  const wasDone = dotIdx < cur;

  if (wasDone) {
    // uncheck: set to dotIdx (remove this and all after)
    state.checks[taskId] = dotIdx;
  } else {
    // check up to dotIdx+1
    state.checks[taskId] = dotIdx + 1;
    if (dotIdx + 1 >= task.goal) {
      // Goal just reached!
      burst(e);
    } else {
      burst(e, true);
    }
  }
  saveState();
  updateUI(catId);
}

function burst(e, small=false) {
  const emoji = BURSTS[Math.floor(Math.random()*BURSTS.length)];
  const b = document.createElement('div');
  b.className = 'burst';
  b.textContent = emoji;
  b.style.left = (e.clientX - 15)+'px';
  b.style.top = (e.clientY + window.scrollY - 15)+'px';
  if (small) b.style.fontSize = '1rem';
  document.body.appendChild(b);
  setTimeout(()=>b.remove(), 800);
}

function updateUI(changedCatId) {
  const cats = changedCatId ? [CATS.find(c=>c.id===changedCatId)] : CATS;
  cats.forEach(cat => {
    renderTasks(cat);
    const goalsHit = cat.tasks.filter(t=>(state.checks[t.id]||0)>=t.goal).length;
    const cp = document.getElementById(`cp_${cat.id}`);
    if(cp) cp.textContent = `${goalsHit}/${cat.tasks.length}`;
  });
  updateWeekRing();
}

function updateWeekRing() {
  const hit = countGoalsHit(state.checks);
  const pct = Math.round(hit/TOTAL_GOALS*100);
  const circ = 132;
  document.getElementById('weekRing').style.strokeDashoffset = circ-(circ*pct/100);
  document.getElementById('weekRingPct').textContent = pct+'%';
  document.getElementById('weekProgressText').textContent = `${hit} de ${TOTAL_GOALS} metas atingidas`;
}

function setWeekLabel() {
  const d = new Date();
  const mon = new Date(d); mon.setDate(d.getDate()-(d.getDay()||7)+1);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt = dt => `${dt.getDate()}/${dt.getMonth()+1}`;
  document.getElementById('weekLabel').textContent = `Semana de ${fmt(mon)} a ${fmt(sun)}`;
}

function confirmReset() {
  if (!confirm('Resetar a semana? Isso salva o progresso atual e começa do zero.')) return;
  saveSnapshot(state);
  state = { weekKey: getWeekKey(), checks: {} };
  saveState();
  buildCats();
  updateWeekRing();
}

/* ══════════════════════════════════
   STATS
══════════════════════════════════ */
function changeMonth(d) {
  viewMonth.m += d;
  if(viewMonth.m<0){viewMonth.m=11;viewMonth.y--;}
  if(viewMonth.m>11){viewMonth.m=0;viewMonth.y++;}
  renderStats();
}

function renderStats() {
  const {y,m} = viewMonth;
  document.getElementById('monthLabel').textContent = `${MONTHS_PT[m]} ${y}`;
  const hist = getHistory();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const today = new Date();
  const isCur = (y===today.getFullYear()&&m===today.getMonth());

  let weeks=0, perfect=0, totalPct=0;
  // per-day
  const dayPcts = {};
  for(let d=1;d<=daysInMonth;d++){
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(hist[key]!==undefined){
      const p=hist[key].pct||0;
      dayPcts[d]=p;
      weeks++; totalPct+=p;
      if(p===100) perfect++;
    }
  }
  const avg = weeks ? Math.round(totalPct/weeks)+'%' : '—';
  document.getElementById('kpiWeeks').textContent = weeks||'—';
  document.getElementById('kpiPerfect').textContent = perfect||'—';
  document.getElementById('kpiAvg').textContent = avg;

  // Calendar
  const grid = document.getElementById('calGrid');
  grid.innerHTML='';
  const firstDay = new Date(y,m,1).getDay();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const e=document.createElement('div');
    const isFut=isCur&&d>today.getDate();
    const isTod=isCur&&d===today.getDate();
    let cls='cal-day ';
    if(isFut){cls+='future';e.textContent=d;}
    else if(dayPcts[d]===undefined){cls+='p0';e.textContent=d;}
    else if(dayPcts[d]===100){cls+='pfull';e.textContent='★';}
    else if(dayPcts[d]>=80){cls+='pgood';e.textContent=d;}
    else if(dayPcts[d]>=50){cls+='pmid';e.textContent=d;}
    else{cls+='plow';e.textContent=d;}
    if(isTod) cls+=' today-mark';
    e.className=cls; grid.appendChild(e);
  }

  // Habit bars — % of days each cat was fully done
  const catDays = {};
  CATS.forEach(cat=>catDays[cat.id]=0);
  let counted=0;
  for(let d=1;d<=daysInMonth;d++){
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry=hist[key]; if(!entry||!entry.catData) continue;
    counted++;
    CATS.forEach(cat=>{ if((entry.catData[cat.id]||0)===cat.tasks.length) catDays[cat.id]++; });
  }
  const barsDiv=document.getElementById('habitBars'); barsDiv.innerHTML='';
  CATS.forEach((cat,ci)=>{
    const pct=counted?Math.round(catDays[cat.id]/counted*100):0;
    const div=document.createElement('div'); div.className='hb-row';
    div.innerHTML=`
      <div class="hb-top">
        <span>${cat.ico} ${cat.name}</span>
        <span style="color:var(--m)">${catDays[cat.id]}d / ${counted}d</span>
      </div>
      <div class="hb-bg"><div class="hb-fill" style="width:${pct}%;background:${CAT_COLORS[ci]}"></div></div>`;
    barsDiv.appendChild(div);
  });

  // Forgot most
  const rates = CATS.map((cat,ci)=>({
    cat,ci,rate:counted?catDays[cat.id]/counted:0
  })).sort((a,b)=>a.rate-b.rate);
  const fDiv=document.getElementById('forgotList'); fDiv.innerHTML='';
  if(!counted){
    fDiv.innerHTML='<div style="color:var(--m);font-size:.83rem;padding:8px 4px">Sem dados para este mês ainda.</div>';
    return;
  }
  rates.slice(0,3).forEach(({cat,rate})=>{
    const missed=counted-catDays[cat.id];
    const div=document.createElement('div'); div.className='forgot-item';
    div.innerHTML=`
      <div style="font-size:1.3rem">${cat.ico}</div>
      <div style="flex:1">
        <div style="font-size:.86rem;font-weight:500">${cat.name}</div>
        <div style="font-size:.7rem;color:var(--m)">Completo em ${Math.round(rate*100)}% dos dias</div>
      </div>
      <div class="forgot-badge">${missed} dia${missed!==1?'s':''} faltando</div>`;
    fDiv.appendChild(div);
  });
}

/* ══════════════════════════════════
   NAV
══════════════════════════════════ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`pg-${id}`).classList.add('active');
  btn.classList.add('active');
  if(id==='stats') renderStats();
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
loadState();
checkAutoReset();
setWeekLabel();
buildCats();
updateWeekRing();

// Check for Sunday midnight reset every minute
setInterval(()=>{
  if(state.weekKey !== getWeekKey()) {
    saveSnapshot(state);
    state={weekKey:getWeekKey(),checks:{}};
    saveState(); buildCats(); updateWeekRing();
  }
}, 60000);
</script>
